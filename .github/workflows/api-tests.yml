name: API Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Override the API base URL for this run"
        required: false
        default: ""
      api_key:
        description: "Reqres x-api-key for this run"
        required: false
        default: ""

jobs:
  api-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API test suite
        env:
          BASE_URL: ${{ github.event.inputs.base_url }}
          REQRES_API_KEY: ${{ github.event.inputs.api_key }}
        run: pytest

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: reports/
          retention-days: 14

      - name: Publish JUnit summary
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: reports/junit.xml
