tests:
  - name: Get all posts
    base_url: jsonplaceholder
    method: GET
    endpoint: /posts
    expected_status: 200
    assertions:
      - len(response) == 100
      - response[0].userId == 1

  - name: Get single post
    base_url: jsonplaceholder
    method: GET
    endpoint: /posts/1
    expected_status: 200
    assertions:
      - response.id == 1
      - response.userId == 1
      - "'title' in response"

  - name: Create post
    base_url: jsonplaceholder
    method: POST
    endpoint: /posts
    payload:
      title: foo
      body: bar
      userId: 1
    expected_status: 201
    assertions:
      - response.title == "foo"
      - response.id is not None

  - name: Update post
    base_url: jsonplaceholder
    method: PUT
    endpoint: /posts/1
    payload:
      id: 1
      title: updated title
      body: updated body
      userId: 1
    expected_status: 200
    assertions:
      - response.title == "updated title"

  - name: Delete post
    base_url: jsonplaceholder
    method: DELETE
    endpoint: /posts/1
    expected_status: 200
