tests:
  - name: Get current weather by city
    base_url: openweather
    method: GET
    endpoint: /data/2.5/weather
    params:
      q: London
      appid: ${OPENWEATHER_API_KEY}
      units: metric
    expected_status: 200
    assertions:
      - response.name == "London"
      - response.main.temp is not None
      - response.weather[0].main is not None

  - name: Invalid API key is rejected
    base_url: openweather
    method: GET
    endpoint: /data/2.5/weather
    params:
      q: London
      appid: this_is_not_a_valid_key
    expected_status: 401
    assertions:
      - response.cod == "401"
